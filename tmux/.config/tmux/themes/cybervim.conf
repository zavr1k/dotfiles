# Cybervim tmux theme - cyberpunk neons on deep navy
# Matches nvim colors/cybervim.lua (aligned with Snazzy p10k palette)
#
# Palette reference (Snazzy-aligned, muted):
#   bg=#141520  bg_dark=#101118  bg_hl=#1e2035
#   fg=#b8c0d0  fg_dim=#8890a0
#   magenta=#d870b8  cyan=#80d0e8  purple=#9888d0  purple_dim=#7870b8
#   blue=#68b8e8  neon=#80d8f0  yellow=#d0c870  red=#d86060
#   comment=#606898  border=#2a2e48

# Options
set -g status-interval 1
set -g status on
set -g status-justify left
set -g status-position bottom

# Status bar base
set -g status-style "bg=#101118,fg=#8890a0"

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=#141520,bg=#d870b8,bold] #S #[fg=#d870b8,bg=#101118,nobold,noitalics,nounderscore]"

# Right: date | time | host
set -g status-right-length 80
set -g status-right "#[fg=#1e2035,bg=#101118]#[fg=#8890a0,bg=#1e2035] %d-%b #[fg=#8890a0,bg=#1e2035,nobold]|#[fg=#8890a0,bg=#1e2035] %H:%M #[fg=#7870b8,bg=#1e2035]#[fg=#b8c0d0,bg=#7870b8,bold] #H "

# Windows: inactive
set -g window-status-format "#[fg=#101118,bg=#1e2035,nobold] #[fg=#8890a0,bg=#1e2035]#I #[fg=#8890a0,bg=#1e2035,nobold]| #[fg=#8890a0,bg=#1e2035]#W #F #[fg=#1e2035,bg=#101118,nobold]"
# Windows: active
set -g window-status-current-format "#[fg=#101118,bg=#80d0e8,nobold] #[fg=#141520,bg=#80d0e8]#I #[fg=#141520,bg=#80d0e8,nobold]| #[fg=#141520,bg=#80d0e8]#W #F #[fg=#80d0e8,bg=#101118,nobold]"
set -g window-status-separator ""
set -g window-status-activity-style "fg=#d0c870"
set -g window-status-bell-style "fg=#d86060"

# Pane borders
set -g pane-border-style "fg=#2a2e48"
set -g pane-active-border-style "fg=#d870b8"

# Messages
set -g message-style "bg=#1e2035,fg=#80d0e8"
set -g message-command-style "bg=#1e2035,fg=#80d0e8"

# Copy mode
set -g mode-style "bg=#7870b8,fg=#b8c0d0"

# Clock
setw -g clock-mode-colour "#80d0e8"

# Display panes
set -g display-panes-colour "#101118"
set -g display-panes-active-colour "#1e2035"
