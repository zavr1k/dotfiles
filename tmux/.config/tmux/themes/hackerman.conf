# Hackerman tmux theme - hacker green, muted for comfort
# Matches nvim colors/hackerman.lua
#
# Palette reference:
#   bg=#0b1210  bg_dark=#080e0c  bg_hl=#142019
#   fg=#a8b8a8  fg_dim=#889888
#   green=#38b255  green_dim=#28943f  green_muted=#2a7040
#   teal=#c87832  cyan=#48b0a5  comment=#526e58  border=#2a3f30

# Options
set -g status-interval 1
set -g status on
set -g status-justify left
set -g status-position bottom

# Status bar base
set -g status-style "bg=#2a3f30,fg=#889888"

# Left: session name
set -g status-left-length 40
set -g status-left "#[fg=#0b1210,bg=#38b255,bold] #S #[fg=#38b255,bg=#2a3f30,nobold,noitalics,nounderscore]"

# Right: date | time | host
set -g status-right-length 80
set -g status-right "#[fg=#142019,bg=#2a3f30]#[fg=#889888,bg=#142019] %d-%b #[fg=#889888,bg=#142019,nobold]|#[fg=#889888,bg=#142019] %H:%M #[fg=#2a7040,bg=#142019]#[fg=#a8b8a8,bg=#2a7040,bold] #H "

# Windows: inactive
set -g window-status-format "#[fg=#2a3f30,bg=#142019,nobold] #[fg=#889888,bg=#142019]#I #[fg=#889888,bg=#142019,nobold]| #[fg=#889888,bg=#142019]#W #F #[fg=#142019,bg=#2a3f30,nobold]"
# Windows: active
set -g window-status-current-format "#[fg=#2a3f30,bg=#c87832,nobold] #[fg=#0b1210,bg=#c87832]#I #[fg=#0b1210,bg=#c87832,nobold]| #[fg=#0b1210,bg=#c87832]#W #F #[fg=#c87832,bg=#2a3f30,nobold]"
set -g window-status-separator ""
set -g window-status-activity-style "fg=#a89040"
set -g window-status-bell-style "fg=#b84545"

# Pane borders
set -g pane-border-style "fg=#2a3f30"
set -g pane-active-border-style "fg=#38b255"

# Messages
set -g message-style "bg=#142019,fg=#c87832"
set -g message-command-style "bg=#142019,fg=#c87832"

# Copy mode
set -g mode-style "bg=#2a7040,fg=#a8b8a8"

# Clock
setw -g clock-mode-colour "#38b255"

# Display panes
set -g display-panes-colour "#080e0c"
set -g display-panes-active-colour "#142019"
